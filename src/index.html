<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Baz Studios</title>
<style>
  :root{
    --bg0:#07080d; --bg1:#0b0d16; --bg2:#111420;
    --ink:#eef0f8; --muted:#9498ab; --faint:#5a5f73;
    --line:rgba(150,160,190,.12); --line-2:rgba(150,160,190,.20);
    --card:rgba(20,23,34,.55);
    --ok:#69e08a; --warn:#f2a24a;
    font-synthesis:none; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,"Helvetica Neue",Arial,sans-serif;
    color:var(--ink); background:var(--bg0); overflow:hidden; user-select:none; -webkit-user-select:none; cursor:default;
  }

  /* ---- ambient background: deep gradient + slow drifting brand-colour blobs + fine grain ---- */
  .bg{position:fixed; inset:0; z-index:0; overflow:hidden;
    background:radial-gradient(135% 115% at 50% -18%, #15182600 0%, var(--bg0) 62%),
               radial-gradient(120% 100% at 50% -10%, #171a2b 0%, var(--bg1) 46%, var(--bg0) 100%)}
  .blob{position:absolute; border-radius:50%; filter:blur(70px); opacity:.24; mix-blend-mode:screen}
  .blob.a{width:46vw; height:46vw; left:-8vw; top:-14vw; background:#7b3cff; animation:drift1 26s ease-in-out infinite}
  .blob.b{width:40vw; height:40vw; right:-10vw; top:-6vw; background:#2a86ff; animation:drift2 32s ease-in-out infinite}
  .blob.c{width:44vw; height:44vw; left:34vw; bottom:-24vw; background:#ff3bd0; opacity:.16; animation:drift3 30s ease-in-out infinite}
  @keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(6vw,4vw) scale(1.08)}}
  @keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-5vw,5vw) scale(1.05)}}
  @keyframes drift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-4vw,-5vw) scale(1.1)}}
  .grain{position:absolute; inset:0; opacity:.05; background-image:
      radial-gradient(1px 1px at 20% 30%, #fff, transparent),
      radial-gradient(1px 1px at 70% 22%, #fff, transparent),
      radial-gradient(1px 1px at 42% 66%, #fff, transparent),
      radial-gradient(1px 1px at 82% 74%, #fff, transparent),
      radial-gradient(1px 1px at 12% 82%, #fff, transparent)}
  .vig{position:absolute; inset:0; background:radial-gradient(130% 100% at 50% 35%, transparent 58%, rgba(0,0,0,.5))}

  .app{position:relative; z-index:10; height:100%; display:flex; flex-direction:column}

  /* ---- header ---- */
  header{flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:26px 34px 14px}
  .brand{display:flex; align-items:center; gap:13px}
  .logo{width:34px; height:34px; border-radius:9px; position:relative; flex:0 0 auto;
    background:conic-gradient(from 210deg, #7b3cff, #2a86ff, #ff3bd0, #7b3cff);
    box-shadow:0 6px 20px rgba(123,60,255,.4), inset 0 1px 0 rgba(255,255,255,.35)}
  .logo::after{content:""; position:absolute; inset:6px; border-radius:5px; background:var(--bg0);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
  .logo::before{content:"B"; position:absolute; inset:0; display:grid; place-items:center; z-index:1;
    font-weight:800; font-size:16px; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.5)}
  .wordmark{line-height:1}
  .wordmark .n{font-size:18px; font-weight:800; letter-spacing:.18em}
  .wordmark .t{font-size:9.5px; font-weight:600; letter-spacing:.42em; color:var(--muted); margin-top:3px; text-transform:uppercase}
  .selfstat{font-size:11px; letter-spacing:.06em; color:var(--faint); display:flex; align-items:center; gap:7px; min-height:16px}

  /* ---- library ---- */
  .lib{flex:1 1 auto; min-height:0; overflow-y:auto; padding:10px 34px 30px}
  .lib::-webkit-scrollbar{width:10px}
  .lib::-webkit-scrollbar-thumb{background:rgba(150,160,190,.18); border-radius:10px; border:3px solid transparent; background-clip:content-box}
  .grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:20px; max-width:1160px; margin:0 auto}

  .card{--aRGB:150,160,190; position:relative; display:flex; flex-direction:column;
    background:var(--card); border:1px solid var(--line); border-radius:18px; overflow:hidden;
    backdrop-filter:blur(10px); box-shadow:0 18px 40px -20px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.04);
    transition:transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .28s, border-color .28s; opacity:0; animation:rise .5s ease forwards}
  @keyframes rise{from{opacity:0; transform:translateY(10px)}to{opacity:1; transform:none}}
  .card:hover{transform:translateY(-5px); border-color:rgba(var(--aRGB),.5);
    box-shadow:0 30px 60px -22px rgba(var(--aRGB),.5), 0 10px 24px -14px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.06)}

  /* art / cover */
  .cover{position:relative; height:168px; display:grid; place-items:center; overflow:hidden;
    background:
      radial-gradient(120% 150% at 50% 8%, rgba(var(--aRGB),.34), transparent 66%),
      linear-gradient(180deg, rgba(var(--aRGB),.12), rgba(6,7,13,.35))}
  .cover::after{content:""; position:absolute; inset:0; box-shadow:inset 0 -40px 40px -30px rgba(6,7,13,.9); pointer-events:none}
  .cover .sheen{position:absolute; top:-60%; left:-30%; width:60%; height:220%; transform:rotate(18deg);
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent); transition:left .6s ease}
  .card:hover .cover .sheen{left:130%}
  .cover img{max-width:80%; max-height:120px; object-fit:contain; filter:drop-shadow(0 6px 20px rgba(var(--aRGB),.55));
    transition:transform .3s ease; image-rendering:auto}
  .card:hover .cover img{transform:scale(1.04)}
  .cover.mark img{max-height:110px; max-width:110px}
  .cover.wordmark img{max-height:62px; max-width:82%}
  /* typographic fallback when a game has no art file */
  .cover .fallback{font-size:30px; font-weight:800; letter-spacing:.02em; color:#fff;
    text-shadow:0 4px 24px rgba(var(--aRGB),.7)}

  .body{padding:15px 17px 16px; display:flex; flex-direction:column; gap:9px; flex:1 1 auto}
  .name{font-size:17px; font-weight:750; letter-spacing:.01em}
  .tag{font-size:12.5px; line-height:1.45; color:var(--muted);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:36px}

  .meta{display:flex; align-items:center; gap:8px; flex-wrap:wrap; min-height:24px; margin-top:1px}
  .chip{display:inline-flex; align-items:center; gap:6px; font-size:11.5px; letter-spacing:.02em;
    padding:4px 10px; border-radius:999px; border:1px solid var(--line-2); color:var(--muted); background:rgba(8,10,18,.5)}
  .chip b{color:var(--ink); font-weight:650}
  .chip.up{color:#ffe6c2; border-color:rgba(242,162,74,.45); background:rgba(60,42,20,.35)}
  .chip.soon{color:var(--faint)}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--ok); box-shadow:0 0 8px var(--ok)}
  .dot.up{background:var(--warn); box-shadow:0 0 8px var(--warn); animation:pulse 1.5s ease-in-out infinite}
  .dot.off{background:var(--faint); box-shadow:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .arr{color:var(--faint); font-size:11px}

  /* progress (indeterminate) */
  .prog{height:6px; border-radius:999px; background:rgba(6,8,16,.7); overflow:hidden; border:1px solid var(--line);
    max-height:0; opacity:0; transition:.3s; margin-top:2px}
  .prog.show{max-height:14px; opacity:1}
  .prog .bar{height:100%; width:36%; border-radius:999px;
    background:linear-gradient(90deg, rgba(var(--aRGB),.4), rgba(var(--aRGB),1), rgba(255,255,255,.9));
    box-shadow:0 0 12px rgba(var(--aRGB),.7); animation:slide 1.15s ease-in-out infinite}
  @keyframes slide{0%{margin-left:-40%}100%{margin-left:100%}}

  .actions{display:flex; gap:9px; margin-top:4px}
  button{font:inherit; cursor:pointer; border:0}
  .btn{flex:1 1 auto; position:relative; overflow:hidden; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    font-size:12.5px; color:#0b0c12; padding:11px 14px; border-radius:11px;
    background:linear-gradient(180deg, rgba(var(--aRGB),1), rgba(var(--aRGB),.72));
    box-shadow:0 8px 20px -8px rgba(var(--aRGB),.7), inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .12s, box-shadow .2s, filter .2s}
  .btn:hover{transform:translateY(-1px); filter:brightness(1.06); box-shadow:0 12px 26px -8px rgba(var(--aRGB),.85), inset 0 1px 0 rgba(255,255,255,.5)}
  .btn:active{transform:translateY(1px)}
  .btn.light{color:#fff; text-shadow:0 1px 6px rgba(0,0,0,.4)} /* on darker accents keep label legible */
  .btn.ghost{flex:0 0 auto; background:rgba(20,24,38,.6); color:var(--muted); border:1px solid var(--line-2);
    box-shadow:none; padding:11px 15px}
  .btn.ghost:hover{color:var(--ink); border-color:rgba(var(--aRGB),.5); background:rgba(30,36,56,.6); filter:none}
  .btn[disabled]{opacity:.45; cursor:default; pointer-events:none; filter:grayscale(.4)}
  .btn .ic{margin-right:6px; font-size:11px; vertical-align:0}

  .err{font-size:11.5px; color:var(--warn); min-height:0; line-height:1.4}

  .spin{display:inline-block; width:12px; height:12px; border-radius:50%; vertical-align:-2px;
    border:2px solid rgba(150,160,190,.3); border-top-color:var(--ink); animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---- footer ---- */
  footer{flex:0 0 auto; display:flex; justify-content:space-between; align-items:center;
    padding:12px 34px 18px; font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint)}
  footer a{color:var(--faint); text-decoration:none}
  footer a:hover{color:var(--ink)}
</style>
</head>
<body>
  <div class="bg"><div class="blob a"></div><div class="blob b"></div><div class="blob c"></div><div class="grain"></div><div class="vig"></div></div>

  <div class="app">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div class="wordmark"><div class="n">BAZ STUDIOS</div><div class="t">Game Launcher</div></div>
      </div>
      <div class="selfstat" id="selfstat"></div>
    </header>

    <main class="lib"><div class="grid" id="grid"></div></main>

    <footer>
      <span>© Baz Studios<span id="lver"></span></span>
      <a id="site" href="#">github.com/Baz-Studios-LLC</a>
    </footer>
  </div>

<script>
(() => {
  "use strict";
  const T = window.__TAURI__;
  const REAL = !!(T && T.core && T.core.invoke);
  const invoke = REAL ? T.core.invoke : mockInvoke;
  const el = (id) => document.getElementById(id);

  const verNewer = (a, b) => { const p = s => String(s||"0").replace(/^v/,"").split(".").map(n=>parseInt(n,10)||0);
    const x=p(a), y=p(b); for (let i=0;i<3;i++){ if((x[i]||0)>(y[i]||0))return true; if((x[i]||0)<(y[i]||0))return false; } return false; };
  // hex -> "r,g,b" for rgba(var(--aRGB), a); luminance picks readable button-label colour.
  const hexRGB = (h) => { const n=parseInt(String(h||"#96a0be").slice(1),16); return [(n>>16)&255,(n>>8)&255,n&255]; };
  const lum = (rgb) => (0.299*rgb[0]+0.587*rgb[1]+0.114*rgb[2])/255;

  const cards = {};          // slug -> { info, els, state }
  let busy = {};             // slug -> true while that game is downloading/launching
  let pollTimer = null;

  // ---- self-update: keep the launcher itself current (silent, in the header) ----
  async function checkSelfUpdate(){
    if (!REAL) return false;
    try {
      const v = await invoke("self_update_check");
      if (!v) return false;
      el("selfstat").innerHTML = `<span class="spin"></span> Updating launcher to v${v}…`;
      await invoke("self_update_install"); // installs + relaunches
      return true;
    } catch { return false; }
  }

  function cardTemplate(info){
    const rgb = hexRGB(info.accent);
    const light = lum(rgb) < 0.6; // dark accent -> white label
    const card = document.createElement("section");
    card.className = "card";
    card.style.setProperty("--aRGB", rgb.join(","));
    card.innerHTML = `
      <div class="cover" data-cover><span class="sheen"></span></div>
      <div class="body">
        <div class="name">${esc(info.name)}</div>
        <div class="tag">${esc(info.tagline)}</div>
        <div class="meta" data-meta></div>
        <div class="prog" data-prog><div class="bar"></div></div>
        <div class="actions" data-actions></div>
        <div class="err" data-err></div>
      </div>`;
    // cover art (falls back to a typographic monogram if the image is missing)
    const cover = card.querySelector("[data-cover]");
    const img = new Image();
    img.alt = info.name;
    img.onload = () => { cover.classList.add(img.naturalWidth / img.naturalHeight >= 2 ? "wordmark" : "mark"); cover.appendChild(img); };
    img.onerror = () => { const f=document.createElement("div"); f.className="fallback"; f.textContent=info.name.split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase(); cover.appendChild(f); };
    img.src = `assets/${info.slug}.png`;
    return {
      card,
      cover, light,
      meta: card.querySelector("[data-meta]"),
      prog: card.querySelector("[data-prog]"),
      actions: card.querySelector("[data-actions]"),
      err: card.querySelector("[data-err]"),
    };
  }

  const esc = (s) => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

  function setMeta(c, html){ c.els.meta.innerHTML = html; }
  function setErr(c, msg){ c.els.err.textContent = msg || ""; }
  function showProg(c, on){ c.els.prog.classList.toggle("show", on); }
  function setButtons(c, list){
    c.els.actions.innerHTML = "";
    for (const b of list){
      const btn = document.createElement("button");
      btn.className = "btn" + (b.ghost ? " ghost" : (c.els.light ? " light" : ""));
      btn.innerHTML = (b.ic ? `<span class="ic">${b.ic}</span>` : "") + b.label;
      if (b.disabled) btn.disabled = true; else btn.onclick = b.onClick;
      c.els.actions.appendChild(btn);
    }
  }

  function render(c){
    const { installed, latest } = c.state;
    setErr(c, "");
    if (c.state.loading){
      setMeta(c, `<span class="chip"><span class="spin" style="width:10px;height:10px;border-width:2px"></span> Checking…</span>`);
      setButtons(c, [{ label:"…", disabled:true }]);
      return;
    }
    // chips
    let chip = "";
    if (installed){
      const up = latest && verNewer(latest, installed);
      chip = `<span class="chip"><span class="dot ${up?'up':''}"></span>Installed <b>v${installed}</b></span>`;
      if (up) chip += `<span class="arr">→</span><span class="chip up"><b>v${latest}</b> ready</span>`;
    } else if (latest){
      chip = `<span class="chip"><span class="dot off"></span>Not installed</span><span class="arr">→</span><span class="chip"><b>v${latest}</b></span>`;
    } else {
      chip = `<span class="chip soon"><span class="dot off"></span>Coming soon</span>`;
    }
    setMeta(c, chip);
    // buttons
    if (installed && latest && verNewer(latest, installed)){
      setButtons(c, [ { label:"Update", ic:"↓", onClick:()=>doUpdate(c,false) }, { label:"Play", ghost:true, onClick:()=>doPlay(c) } ]);
    } else if (installed){
      setButtons(c, [ { label:"Play", ic:"▶", onClick:()=>doPlay(c) } ]);
    } else if (latest){
      setButtons(c, [ { label:"Install & Play", ic:"↓", onClick:()=>doUpdate(c,true) } ]);
    } else {
      setButtons(c, [ { label:"Coming Soon", disabled:true } ]);
    }
  }

  async function refresh(c){
    c.state.loading = true; render(c);
    try { c.state.installed = await invoke("installed_version", { slug:c.info.slug }); } catch { c.state.installed = null; }
    try { const info = await invoke("check_latest", { slug:c.info.slug }); c.state.latest = info.version; c.state.url = info.url; }
    catch { c.state.latest = null; } // private/no-release/offline -> Coming soon (or Play if already installed)
    c.state.loading = false; render(c);
  }

  async function doUpdate(c, thenPlay){
    busy[c.info.slug] = true; setButtons(c, []); showProg(c, true); setErr(c,"");
    try {
      await invoke("install", { slug:c.info.slug, url:c.state.url, version:c.state.latest });
      c.state.installed = c.state.latest;
      if (thenPlay) return doPlay(c);
      showProg(c, false); busy[c.info.slug]=false; render(c);
    } catch (e){
      showProg(c, false); busy[c.info.slug]=false; render(c);
      setErr(c, "Update failed: " + String(e).slice(0,70));
    }
  }

  async function doPlay(c){
    busy[c.info.slug] = true; setButtons(c, [{label:"Launching…", disabled:true}]); showProg(c, true); setErr(c,"");
    try { await invoke("play", { slug:c.info.slug }); /* Rust reconfigures this window + opens the game */ }
    catch (e){
      showProg(c, false); busy[c.info.slug]=false; render(c);
      setErr(c, "Couldn't launch: " + String(e).slice(0,70));
    }
  }

  // background poll: quietly re-check installed/latest so new builds surface on their own
  async function poll(){
    if (await hasAnyBusy()) return;
    if (REAL){ try { if (await invoke("self_update_check")){ await checkSelfUpdate(); return; } } catch {} }
    for (const slug in cards){ const c = cards[slug]; if (busy[slug]) continue;
      try { const info = await invoke("check_latest", { slug }); if (info && info.version && info.version !== c.state.latest){ c.state.latest = info.version; c.state.url = info.url; render(c); } } catch {}
    }
  }
  const hasAnyBusy = async () => Object.values(busy).some(Boolean);

  async function boot(){
    try { el("lver").textContent = " · Launcher v" + await invoke("launcher_version"); } catch {}
    if (await checkSelfUpdate()) return; // relaunching into the new launcher
    el("selfstat").textContent = "";
    let list = [];
    try { list = await invoke("games"); } catch {}
    const grid = el("grid"); grid.innerHTML = "";
    list.forEach((info, i) => {
      const els = cardTemplate(info);
      els.card.style.animationDelay = (i*70) + "ms";
      grid.appendChild(els.card);
      const c = { info, els, state:{ loading:true, installed:null, latest:null, url:null } };
      cards[info.slug] = c;
      render(c);
      refresh(c);
    });
    if (!pollTimer) pollTimer = setInterval(poll, 120000);
  }

  el("site").onclick = (e) => { e.preventDefault(); if (REAL && T.opener && T.opener.openUrl) T.opener.openUrl("https://github.com/Baz-Studios-LLC"); };

  // ---- mock backend (plain-browser preview via ?mock=) -----------------------------------------
  function mockInvoke(cmd, args){
    const wait = (ms,v)=>new Promise(r=>setTimeout(()=>r(v),ms));
    const slug = args && args.slug;
    if (cmd === "launcher_version") return wait(40, "0.1.0");
    if (cmd === "self_update_check") return wait(40, null);
    if (cmd === "games") return wait(60, [
      { slug:"wriftheart", name:"WriftHeart", tagline:"An 8-bit action-RPG of a shattered world. Gather the ten shards; mend the Wriftheart.", repo:"Baz-Studios-LLC/wriftheart", accent:"#b06cff" },
      { slug:"wingman", name:"Wingman", tagline:"A twin-stick shooter where you fly two ships at once.", repo:"Baz-Studios-LLC/Wingman", accent:"#3a86ff" },
      { slug:"neondrift", name:"Neon Drift", tagline:"Neon-soaked arcade drifting on the edge of the grid.", repo:"Baz-Studios-LLC/Neon-Drift", accent:"#ff3bd0" },
    ]);
    if (cmd === "installed_version") return wait(500, slug==="wriftheart" ? "0.6.45" : null);
    if (cmd === "check_latest"){
      if (slug==="wriftheart") return wait(900, { version:"0.6.46", url:"#" });
      if (slug==="wingman")    return wait(900, { version:"0.1.0", url:"#" });
      return wait(700, Promise.reject("no release")); // neondrift -> coming soon (native-only; no web bundle yet)
    }
    if (cmd === "install") return wait(2200);
    if (cmd === "play") return wait(1200, alert("(preview) would launch "+slug));
    return wait(200);
  }

  boot();
})();
</script>
</body>
</html>
